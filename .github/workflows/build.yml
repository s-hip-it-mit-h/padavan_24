name: Build firmware

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get variables
      run: |
        sed -i 's/\r$//' variables
        sed -i 's/\r$//' build.config
        cat variables build.config > /tmp/vars.env
        set -a
        . /tmp/vars.env
        set +a
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in $(compgen -v | grep -E '^(PADAVAN_|CONFIG_)'); do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Download sources
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO" padavan-ng
        cd padavan-ng
        if [ -n "$PADAVAN_COMMIT" ]; then
          git checkout "$PADAVAN_COMMIT"
        fi

    - name: Compute toolchain cache key
      id: tc_key
      run: |
        # Хеш файлов toolchain'а — если они меняются, пересобираем
        HASH=$(find padavan-ng/toolchain -type f \
               \( -name "*.sh" -o -name "*.config" -o -name "config.*" -o -name "Makefile*" \) \
               -exec sha1sum {} \; 2>/dev/null | sort | sha1sum | awk '{print $1}')
        echo "hash=$HASH" >> $GITHUB_OUTPUT
        echo "Toolchain hash: $HASH"

    - name: Restore toolchain cache
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: padavan-ng/toolchain/out
        key: padavan-toolchain-${{ steps.tc_key.outputs.hash }}
        restore-keys: |
          padavan-toolchain-

    - name: Build toolchain (if cache miss)
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        echo "=== Кеш toolchain не найден, собираем с нуля ==="
        cd padavan-ng/toolchain
        ./clean_sources.sh || true
        ./build_toolchain.sh
        echo "=== Toolchain собран ==="
        ls -la out/bin/ | head -20

    - name: Verify toolchain
      run: |
        GCC=padavan-ng/toolchain/out/bin/mipsel-linux-uclibc-gcc
        if [ ! -f "$GCC" ]; then
          echo "❌ Toolchain не найден после сборки/восстановления из кеша!"
          ls -la padavan-ng/toolchain/out/ 2>/dev/null || true
          exit 1
        fi
        "$GCC" --version
        echo "✅ Toolchain готов"

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed
          for theme in $PADAVAN_THEMES; do
            echo "Installing $theme theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: |
        if [ -f pre-build.sh ]; then
          . ./pre-build.sh
        fi

    - name: Build firmware
      run: |
        cp build.config padavan-ng/trunk/.config
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh
        FW_FILE_NAME=$(find images -type f \( -name "*.trx" -o -name "*.bin" \) -printf "%T@ %f\n" | sort -n | tail -1 | cut -d' ' -f2-)
        if [ -z "$FW_FILE_NAME" ]; then
          echo "Firmware file not found"
          exit 1
        fi
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: |
        if [ -f post-build.sh ]; then
          . ./post-build.sh
        fi

    - name: Prepare artifacts
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: padavan-ng_${{ env.CONFIG_VENDOR }}_${{ env.CONFIG_FIRMWARE_PRODUCT_ID }}_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.FW_FILE_NAME }}
          build.config

    - name: Check firmware size
      run: |
        partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
        if [ ! -f "$partitions" ]; then
          echo "Partitions file not found: $partitions"
          exit 0
        fi
        max_fw_size=$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")
        fw_size=$(stat -c %s "$FW_FILE_NAME")
        if (( fw_size > max_fw_size )); then
          fw_size_fmtd=$(numfmt --grouping "$fw_size")
          max_fw_size_fmtd=$(numfmt --grouping "$max_fw_size")
          echo "Firmware size ($fw_size_fmtd bytes) exceeds max size ($max_fw_size_fmtd bytes)"
          exit 1
        else
          echo "Firmware size ($fw_size bytes) is within the limit ($max_fw_size bytes)."
        fi
